name: Realitni hlidaci pes

on:
  schedule:
    # Kazdych 15 minut. GitHub casem casuje s malym zpozdenim (obvykle
    # do par minut), realne tedy kontrola probehne cca kazdych 15-20 min.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}   # umoznuje rucni spusteni z GitHub UI (zalozka Actions)

# Aby workflow mohl commitnout aktualizovany data/seen.json zpet do repa
permissions:
  contents: write

concurrency:
  group: reality-watchdog
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitare
        uses: actions/checkout@v4

      - name: Nastaveni Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalace zavislosti
        run: pip install -r requirements.txt

      - name: Spusteni hlidaciho psa
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python main.py

      - name: Ulozeni aktualizovaneho seznamu videnych inzeratu
        run: |
          git config user.name "reality-watchdog-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/seen.json
          git diff --staged --quiet || git commit -m "Aktualizace seen.json [skip ci]"
          git push
